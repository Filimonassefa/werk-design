<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | ወርቅ ዲዛይን</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,700;1,6..96,700&family=Tenor+Sans&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --royal-gold: #B8860B; /* Deeper gold for better contrast on white */
            --bright-gold: #D4AF37;
            --alabaster: #F9F9F7;
            --pure-white: #ffffff;
            --charcoal: #1A1A1A;
            --ease-luxury: cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            margin: 0;
            font-family: 'Tenor Sans', sans-serif;
            background-color: var(--pure-white); 
            color: var(--charcoal);
            overflow-x: hidden;
        }

        /* Black Header (Keeping the architectural anchor you liked) */
        nav { 
            position: fixed; top: 0; width: 100%; padding: 1.2rem 0; 
            background: var(--charcoal); z-index: 2000; 
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            border-bottom: 2px solid var(--bright-gold);
        }

        .logo-gold {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.8rem;
            text-align: center;
            letter-spacing: 3px;
            color: var(--bright-gold);
            font-weight: 700;
        }

        .back-btn {
            position: absolute; left: 5%; color: #888;
            text-decoration: none; font-size: 0.7rem; letter-spacing: 2px;
        }

        /* --- CONTACT CONTENT --- */
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 120px 8% 60px;
            background: linear-gradient(to bottom, var(--alabaster) 0%, var(--pure-white) 100%);
        }

        .section-tag {
            letter-spacing: 6px; color: var(--royal-gold); font-size: 0.7rem; margin-bottom: 1rem; text-transform: uppercase;
        }

        h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 3.5rem;
            margin: 0 0 4rem;
            color: var(--charcoal);
        }

        /* --- THE TOUCHPOINT GRID --- */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2.5rem;
            width: 100%;
            max-width: 1100px;
        }

        .contact-method {
            background: var(--pure-white);
            padding: 4rem 2rem;
            /* Contrast: A solid gold border instead of a faint one */
            border: 1px solid var(--bright-gold); 
            text-decoration: none;
            transition: 0.5s var(--ease-luxury);
            display: flex;
            flex-direction: column;
            align-items: center;
            /* "Touch": A sophisticated soft shadow */
            box-shadow: 10px 10px 0px rgba(184, 134, 11, 0.05); 
        }

        .contact-method:hover {
            transform: translateY(-10px);
            box-shadow: 20px 20px 0px rgba(184, 134, 11, 0.1);
            background: var(--alabaster);
        }

        .contact-icon {
            width: 50px;
            height: 50px;
            fill: var(--royal-gold); /* ALWAYS GOLDEN */
            margin-bottom: 2rem;
            filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.1));
        }

        .contact-method h2 {
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--charcoal);
            margin-bottom: 1rem;
        }

        .contact-method p {
            font-size: 0.7rem;
            color: #666;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        footer {
            margin-top: 5rem;
            font-size: 0.6rem;
            letter-spacing: 4px;
            color: #aaa;
        }

        @media (max-width: 900px) {
            .contact-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
